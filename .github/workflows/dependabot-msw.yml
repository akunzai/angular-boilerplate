name: Update MSW Service Worker

on:
  pull_request_target:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-msw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if msw was updated
        id: check-msw
        run: |
          git fetch origin main --depth=1
          if git diff origin/main...HEAD -- pnpm-lock.yaml | grep -q "msw:"; then
            echo "msw_updated=true" >> $GITHUB_OUTPUT
          else
            echo "msw_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check-msw.outputs.msw_updated == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up pnpm
        if: steps.check-msw.outputs.msw_updated == 'true'
        uses: pnpm/action-setup@v6

      - name: Update mockServiceWorker.js
        if: steps.check-msw.outputs.msw_updated == 'true'
        run: |
          pnpm dlx msw init src --save=false
          
          if git diff --quiet src/mockServiceWorker.js; then
            echo "No changes in mockServiceWorker.js"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add src/mockServiceWorker.js
            git commit -m "chore: update mockServiceWorker.js for msw upgrade"
            git push
          fi
